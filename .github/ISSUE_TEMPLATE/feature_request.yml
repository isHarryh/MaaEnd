name: 功能建议 / Feature Request
description: 提出新功能或改进建议 / Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: |
        请描述您希望添加的功能，以及使用场景。
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志文件
      description: |
        🐛 很多时候您的提议可能已经实现，但由于出现 BUG 未能正常工作，请提交日志以协助排查。  
        💡 点击界面上“运行日志”右上角的 🗄️ 导出日志文件。  
        ⚠️ 请将上传导出后的 MaaEnd-logs-xxx.zip 文件 ⚠️  
        🚫 **否则您的提议可能会被直接关闭！**  
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MaaEnd 版本
      placeholder: "例如: v1.1.0"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 软件和游戏截图等
    validations:
      required: false
